name: Build mhcraft

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, windows-arm64, macos-arm64]
        include:
          - os: ubuntu-latest
            artifact_name: mhcraft-linux-x64
            asset_name: mhcraft-linux-x64.zip
          - os: windows-latest
            artifact_name: mhcraft-windows-x64
            asset_name: mhcraft-windows-x64.zip
          - os: macos-latest
            artifact_name: mhcraft-macos-x64
            asset_name: mhcraft-macos-x64.zip
          - os: windows-arm64
            artifact_name: mhcraft-windows-arm64
            asset_name: mhcraft-windows-arm64.zip
          - os: macos-arm64
            artifact_name: mhcraft-macos-arm64
            asset_name: mhcraft-macos-arm64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean -w -i favicon.ico --onefile --name mhcraft mhcraft.py

      - name: Package Build Artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-arm64" ]; then
            zip -r ../${{ matrix.asset_name }} mhcraft.exe
          else
            zip -r ../${{ matrix.asset_name }} mhcraft
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1
