name: Build mhcraft

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (手动触发时填写，例如 v1.0.0)'
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'

jobs:
  build:
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, windows-arm64, macos-arm64]
        include:
          - os: ubuntu-latest
            artifact_name: mhcraft-linux-x64
            file_name: mhcraft
          - os: windows-latest
            artifact_name: mhcraft-windows-x64
            file_name: mhcraft.exe
          - os: macos-latest
            artifact_name: mhcraft-macos-x64
            file_name: mhcraft
          - os: windows-arm64
            artifact_name: mhcraft-windows-arm64
            file_name: mhcraft.exe
          - os: macos-arm64
            artifact_name: mhcraft-macos-arm64
            file_name: mhcraft

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          # 默认打包参数
          PYINSTALLER_ARGS="--clean -w --onefile --name mhcraft mhcraft.py"
          
          # 仅在 Windows 环境下，且 favicon.ico 存在时，才添加图标参数
          if [[ "${{ matrix.os }}" == windows-* ]] && [ -f "favicon.ico" ]; then
            PYINSTALLER_ARGS="$PYINSTALLER_ARGS -i favicon.ico"
            echo "✅ Found favicon.ico, applying icon..."
          else
            echo "⚠️ Skipping icon (Not Windows or favicon.ico not found)"
          fi
          
          # 执行打包
          pyinstaller $PYINSTALLER_ARGS

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.file_name }}
          retention-days: 1
