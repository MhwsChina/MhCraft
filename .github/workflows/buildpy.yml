name: Build mhcraft

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (例如 v1.0.0)'
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'

jobs:
  build:
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: mhcraft-linux-x64
            # 核心修改：为不同平台指定独立的二进制文件名
            binary_name: mhcraft-linux 
          - os: windows-latest
            artifact_name: mhcraft-windows-x64
            binary_name: mhcraft.exe
          - os: macos-latest
            artifact_name: mhcraft-macos-x64
            binary_name: mhcraft-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          PYINSTALLER_ARGS="--clean -w --onefile --name ${{ matrix.binary_name }} mhcraft.py"
          if [[ "${{ matrix.os }}" == windows-* ]] && [ -f "favicon.ico" ]; then
            PYINSTALLER_ARGS="$PYINSTALLER_ARGS -i favicon.ico"
            echo "✅ Found favicon.ico, applying icon..."
          else
            echo "⚠️ Skipping icon (Not Windows or favicon.ico not found)"
          fi
          pyinstaller $PYINSTALLER_ARGS

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          # 核心修改：使用新的二进制文件名进行上传
          path: dist/${{ matrix.binary_name }}
          retention-days: 1
