name: Build MhCraft

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      python_version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.14'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: mhcraft-linux
            asset_name: mhcraft-linux.zip
          - os: windows-latest
            artifact_name: mhcraft-windows
            asset_name: mhcraft-windows.zip
          - os: macos-latest
            artifact_name: mhcraft-macos
            asset_name: mhcraft-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          # --clean: 清理临时文件
          # -w: 隐藏控制台窗口 (Windows GUI模式)
          # -i: 设置可执行文件图标
          pyinstaller --clean -w -i favicon.ico --onefile --name mhcraft mhcraft.py

      - name: Package Build Artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            zip -r ../${{ matrix.asset_name }} mhcraft.exe
          else
            zip -r ../${{ matrix.asset_name }} mhcraft
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1
