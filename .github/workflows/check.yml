name: Check Release and Sync Assets

on:
  release:
    types: [published]
  # 新增：允许在 GitHub 网页端手动触发
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (手动触发时填写，例如 v1.0.0)'
        required: true
        type: string

jobs:
  trigger-build:
    uses: ./.github/workflows/buildpy.yml
    with:
      release_tag: ${{ inputs.release_tag }}

  sync-to-release:
    needs: trigger-build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded files (Debug)
        run: ls -R artifacts/

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: artifacts/**/*.zip 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
