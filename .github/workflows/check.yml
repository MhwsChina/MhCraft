name: Check Release and Sync Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag (例如 v1.0.0)'
        required: true
        type: string

# 核心修改：在这里添加 permissions 配置
permissions:
  contents: write

jobs:
  trigger-build:
    uses: ./.github/workflows/buildpy.yml
    with:
      release_tag: ${{ inputs.release_tag || github.event.release.tag_name }}

  sync-to-release:
    if: always() 
    needs: trigger-build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded files (Debug)
        run: ls -R artifacts/

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.event.release.tag_name }}
          files: artifacts/**/*.zip 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
