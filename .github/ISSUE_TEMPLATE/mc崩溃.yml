name: MC启动失败
description: 启动游戏后mc窗口没有出现或闪退，又或者mc窗口出现了，但还在加载进度条的时候闪退了
title: "[MC启动BUG]:"
labels: [BUG]
body:
  - type: checkboxes
    id: check
    attributes:
      label: 检查项
      description: 请确认以下选项
      options:
        - label: "**我所启动的mc版本没有安装任何模组。(不过可以安装模组加载器)** 安装模组后才崩溃基本不是启动器导致的，如果删除模组可以启动请 **不要** 提交反馈。不过你可以在issues中发起提问来寻求帮助。"
          required: true
        - label: "**我已使用HMCL或PCL启动，并没有出现问题。** 如果HMCL和PCL都无法启动就不是该启动器导致的问题，请 **不要** 提交反馈。[下载 HMCL](https://hmcl.huangyuhui.net/download)"
          required: true
        - label: "我已在[Issues 页面](https://github.com/MhwsChina/MhCraft/issues)中搜索，确认了这一BUG未被提交过。"
          required: true
        - label: "我使用的系统是Windows,Linux,Mac-OS三者之一(因为作者已经放弃支持各种各样的奇葩系统了)"
          required: true
        - label: "我使用的启动器版本是最新的"
          required: true
  - type: textarea
    id: "description"
    attributes:
      label: 描述
      description: 详细描述具体表现
    validations:
      required: true
  - type: upload
    id: "file1"
    attributes:
      label: 启动脚本
      description: 请在该启动器中选择无法启动的版本，点击导出启动脚本，然后上传到此处
    validations:
      required: true
  - type: upload
    id: "file2"
    attributes:
      label: HMCL或PCL启动脚本
      description: 在HMCL或PCL生成启动脚本然后上传
    validations:
      required: true
